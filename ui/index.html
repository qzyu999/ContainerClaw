<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContainerClaw Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-bg"></div>
    <main class="dashboard">
        <header>
            <div class="logo">
                <span class="icon">🦀</span>
                <h1>ContainerClaw</h1>
            </div>
            <div class="status-badge">
                <span class="pulse"></span>
                System Active
            </div>
        </header>

        <section class="hero">
            <h2>Secure Agent Sandbox</h2>
            <p>Your session <span class="session-id">user-session</span> is isolated and ready.</p>
            <form id="task-form" class="task-input">
                <input type="text" id="prompt" placeholder="Ask your agent (e.g. 'check my files')" autocomplete="off">
                <button type="submit">Execute</button>
            </form>
        </section>

        <div class="grid">
            <div class="card">
                <h3>Agent Status</h3>
                <div id="agent-status" class="stat">Idle</div>
                <p>Execution lifecycle monitor.</p>
            </div>
            <div class="card">
                <h3>Workspace</h3>
                <div id="workspace-files" class="stat-small">Scanning...</div>
                <p>Current sandbox files.</p>
            </div>
            <div class="card">
                <h3>Safety Check</h3>
                <div id="safety-level" class="stat">Low Risk</div>
                <div class="risk-meter-bg">
                    <div id="risk-meter" class="risk-meter-fill"></div>
                </div>
            </div>
        </div>

        <section class="main-content">
            <aside class="history-sidebar">
                <div class="sidebar-header">Session History</div>
                <div id="history-list" class="history-body">
                    <!-- History items will be injected here -->
                </div>
            </aside>

            <footer class="terminal-preview">
                <div class="term-header">Terminal Output</div>
                <div id="terminal" class="term-body">
                    <p>> [SYSTEM] Ready for tasks.</p>
                    <span class="cursor">_</span>
                </div>
            </footer>
        </section>
    </main>

    <script>
        const terminal = document.getElementById('terminal');
        const form = document.getElementById('task-form');
        const promptInput = document.getElementById('prompt');
        const sessionId = "user-session"; // Standard for MVP

        const riskMeter = document.getElementById('risk-meter');
        const safetyLevel = document.getElementById('safety-level');
        const workspaceFiles = document.getElementById('workspace-files');
        const historyList = document.getElementById('history-list');

        function updateWorkspace() {
            fetch(`http://localhost:5001/workspace/${sessionId}`)
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'ok') {
                        workspaceFiles.innerText = data.files.join(', ') || 'Empty';
                    }
                })
                .catch(e => { workspaceFiles.innerText = 'Error'; });
        }

        function addLog(type, content, risk_score = 0.1) {
            const p = document.createElement('p');
            const timestamp = new Date().toLocaleTimeString();
            
            // Risk level class
            let riskClass = 'risk-low';
            if (risk_score > 0.7) riskClass = 'risk-high';
            else if (risk_score > 0.3) riskClass = 'risk-med';

            p.innerHTML = `
                <span class="timestamp">[${timestamp}]</span> 
                <span class="tag ${type}">[${type.toUpperCase()}]</span> 
                ${content}
                <span class="risk-indicator ${riskClass}"></span>
            `;
            
            terminal.insertBefore(p, terminal.lastElementChild);
            terminal.scrollTop = terminal.scrollHeight;

            // Add to history sidebar if it's a thought or user prompt
            if (type === 'thought' || type === 'user') {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerText = content.substring(0, 50) + (content.length > 50 ? '...' : '');
                item.onclick = () => { promptInput.value = content; };
                historyList.prepend(item);
            }

            // Update safety meter
            if (risk_score) {
                const percent = risk_score * 100;
                riskMeter.style.width = `${percent}%`;
                if (risk_score > 0.7) {
                    safetyLevel.innerText = "High Risk";
                    safetyLevel.style.color = "#e74c3c";
                } else if (risk_score > 0.3) {
                    safetyLevel.innerText = "Medium Risk";
                    safetyLevel.style.color = "#f1c40f";
                } else {
                    safetyLevel.innerText = "Low Risk";
                    safetyLevel.style.color = "#4ade80";
                }
            }
        }

        // 1. Connect to SSE Stream
        const eventSource = new EventSource(`http://localhost:5001/events/${sessionId}`);
        
        eventSource.onmessage = (event) => {
            const data = JSON.parse(event.data);
            addLog(data.type, data.content, data.risk_score);
            if (data.type === 'thought') {
                document.getElementById('agent-status').innerText = "Thinking...";
                document.getElementById('agent-status').className = "stat active";
            } else if (data.type === 'finish' || data.type === 'error') {
                document.getElementById('agent-status').innerText = "Idle";
                document.getElementById('agent-status').className = "stat";
                updateWorkspace(); // Refresh workspace after task
            }
        };

        // Initial fetch
        updateWorkspace();

        // 2. Submit Task
        form.onsubmit = async (e) => {
            e.preventDefault();
            const prompt = promptInput.value;
            if (!prompt) return;

            addLog('user', prompt);
            promptInput.value = '';

            try {
                const resp = await fetch('http://localhost:5001/task', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt, session_id: sessionId })
                });
                const result = await resp.json();
                if (result.status === 'error') {
                    addLog('error', result.message);
                }
            } catch (err) {
                addLog('error', 'Failed to send task to bridge.');
            }
        };
    </script>
</body>
</html>
