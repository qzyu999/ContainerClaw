syntax = "proto3";

package containerclaw;

service AgentService {
  // Start a new task on the agent
  rpc ExecuteTask (TaskRequest) returns (TaskStatus);
  
  // Stream activity logs and thought states to the UI
  rpc StreamActivity (ActivityRequest) returns (stream ActivityEvent);

  // List files in the workspace
  rpc ListWorkspace (WorkspaceRequest) returns (WorkspaceResponse);
}

message TaskRequest {
  string prompt = 1;
  string session_id = 2;
}

message TaskStatus {
  bool accepted = 1;
  string message = 2;
}

message ActivityRequest {
  string session_id = 1;
}

message ActivityEvent {
  string timestamp = 1;
  string type = 2; // "thought", "tool_call", "output", "error", "finish"
  string content = 3;
  float risk_score = 4;
  string actor_id = 5;
}

message WorkspaceRequest {
  string session_id = 1;
}

message WorkspaceResponse {
  repeated string files = 1;
}
