syntax = "proto3";

package containerclaw;

service AgentService {
  // Start a new task on the agent
  rpc ExecuteTask (TaskRequest) returns (TaskStatus);
  
  // Stream activity logs and thought states to the UI
  rpc StreamActivity (ActivityRequest) returns (stream ActivityEvent);

  // List files in the workspace
  rpc ListWorkspace (WorkspaceRequest) returns (WorkspaceResponse);

  // Read a single file from the workspace
  rpc ReadFile (FileRequest) returns (FileResponse);

  // Get diff data for a file (vs git HEAD)
  rpc DiffFile (DiffRequest) returns (DiffResponse);

  // Get chat history from Fluss
  rpc GetHistory (ActivityRequest) returns (HistoryResponse);
}

message HistoryResponse {
  repeated ActivityEvent events = 1;
}

message TaskRequest {
  string prompt = 1;
  string session_id = 2;
}

message TaskStatus {
  bool accepted = 1;
  string message = 2;
}

message ActivityRequest {
  string session_id = 1;
}

message ActivityEvent {
  string timestamp = 1;
  string type = 2; // "thought", "action", "output", "error", "finish"
  string content = 3;
  float risk_score = 4;
  string actor_id = 5;
}

message WorkspaceRequest {
  string session_id = 1;
}

message WorkspaceResponse {
  repeated FileEntry files = 1;
}

message FileEntry {
  string path = 1;
  bool is_directory = 2;
  int64 size_bytes = 3;
  string modified_at = 4;
}

message FileRequest {
  string session_id = 1;
  string path = 2;
}

message FileResponse {
  string content = 1;
  string language = 2;
  string path = 3;
}

message DiffRequest {
  string session_id = 1;
  string path = 2;
}

message DiffResponse {
  string original = 1;
  string modified = 2;
  string diff_text = 3;
}
