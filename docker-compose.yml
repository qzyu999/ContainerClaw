services:
  claw-agent:
    container_name: claw-agent
    build:
      context: ./agent
    ports:
      - "50051:50051"
      - "5001:5001"
    networks:
      - claw_v3_net
    volumes:
      - ${PROJECT_DIR:-.}:/workspace:rw
    environment:
      - LLM_GATEWAY_URL=${LLM_GATEWAY_URL:-http://llm-gateway:8000}
      - FLUSS_ENDPOINT=${FLUSS_ENDPOINT:-fluss:9092}
    tty: true
    stdin_open: true

  llm-gateway:
    build:
      context: ./llm-gateway
    ports:
      - "8000:8000"
    networks:
      - claw_v3_net
    secrets:
      - gemini_api_key
      - anthropic_api_key
      - openai_api_key
    environment:
      - RATE_LIMIT_RPM=60
      - MAX_TOKENS_PER_REQUEST=8192
    command: ["gunicorn", "--timeout", "120", "--bind", "0.0.0.0:8000", "src.main:app"]

  fluss:
    image: apache/flink:latest
    networks:
      - claw_v3_net
    volumes:
      - fluss_data:/var/lib/fluss

  ui:
    build:
      context: ./ui
    ports:
      - "3000:80"
    networks:
      - claw_v3_net
    depends_on:
      - ui-bridge

  ui-bridge:
    build:
      context: ./ui
      dockerfile: bridge.Dockerfile
    network_mode: "service:claw-agent"
    environment:
      - AGENT_URL=localhost:50051
      - GRPC_DNS_RESOLVER=native
    depends_on:
      - claw-agent

networks:
  claw_v3_net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400

volumes:
  fluss_data:

secrets:
  gemini_api_key:
    file: ./secrets/gemini_api_key.txt
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt
  openai_api_key:
    file: ./secrets/openai_api_key.txt
