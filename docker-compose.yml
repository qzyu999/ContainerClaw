services:
  agent:
    build:
      context: ./agent
    ports:
      - "50051:50051"
    networks:
      - internal
    volumes:
      - ${PROJECT_DIR:-.}:/workspace:rw
    environment:
      - LLM_GATEWAY_URL=${LLM_GATEWAY_URL:-http://llm-gateway:8000}
      - FLUSS_ENDPOINT=${FLUSS_ENDPOINT:-fluss:9092}
    security_opt:
      - no-new-privileges:true
    # Note: seccomp and apparmor profiles will be added in subsequent steps
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    user: "1000:1000"

  llm-gateway:
    build:
      context: ./llm-gateway
    networks:
      - internal
      - egress
    secrets:
      - gemini_api_key
      - anthropic_api_key
      - openai_api_key
    environment:
      - RATE_LIMIT_RPM=60
      - MAX_TOKENS_PER_REQUEST=8192
      - ALLOWED_MODELS=claude-sonnet-4-20250514,gpt-4o
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "65534:65534"

  fluss:
    image: apache/flink:latest # Placeholder for Fluss
    networks:
      - internal
    volumes:
      - fluss_data:/var/lib/fluss

  ui:
    build:
      context: ./ui
    ports:
      - "3000:80"
    networks:
      - internal
      - frontend

networks:
  frontend:
    driver: bridge
  internal:
    driver: bridge
    internal: true
  egress:
    driver: bridge

volumes:
  fluss_data:

secrets:
  gemini_api_key:
    file: ./secrets/gemini_api_key.txt
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt
  openai_api_key:
    file: ./secrets/openai_api_key.txt
