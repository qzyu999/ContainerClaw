services:
  claw-agent:
    container_name: claw-agent
    build:
      context: .
      dockerfile: agent/Dockerfile
    ports:
      - "50051:50051"
      - "5001:5001"
    networks:
      - internal
      - frontend
    volumes:
      - ${PROJECT_DIR:-.}/workspace:/workspace:rw
      - ${PROJECT_DIR:-.}/.claw_state:/state:rw
    secrets:
      - gemini_api_key # MUST give the agent access to read the key for moderator.py
    environment:
      - PYTHONUNBUFFERED=1
      - CLAW_SESSION_ID=user-session
      - LLM_GATEWAY_URL=${LLM_GATEWAY_URL:-http://llm-gateway:8000}
      - FLUSS_BOOTSTRAP_SERVERS=coordinator-server:9123
      - AUTONOMOUS_STEPS=${AUTONOMOUS_STEPS:--1}
    depends_on:
      coordinator-server:
        condition: service_started
      llm-gateway:
        condition: service_started
    tty: true
    stdin_open: true
    read_only: true
    tmpfs:
      - /tmp:size=512M,noexec
    security_opt:
      - "no-new-privileges:true"
      - "seccomp:unconfined"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    user: "1000:1000"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
    healthcheck:
      # Simple gRPC healthcheck
      test: [ "CMD-SHELL", "python3 -c 'import socket; s = socket.socket(socket.AF_INET, socket.SOCK_STREAM); s.connect((\"localhost\", 50051))'" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s # Give it a full minute to init Fluss before checking health

  llm-gateway:
    build:
      context: ./llm-gateway
    ports:
      - "8000:8000"
    networks:
      - internal
      - egress
    secrets:
      - gemini_api_key
      - anthropic_api_key
      - openai_api_key
    environment:
      - RATE_LIMIT_RPM=60
      - MAX_TOKENS_PER_REQUEST=8192
    command: [ "gunicorn", "-w", "4", "--timeout", "120", "--bind", "0.0.0.0:8000", "src.main:app" ]

  zookeeper:
    image: zookeeper:3.9.2
    restart: always
    networks:
      - internal
    volumes:
      - ${PROJECT_DIR:-.}/.zk_data/data:/data
      - ${PROJECT_DIR:-.}/.zk_data/datalog:/datalog
    healthcheck:
      test: [ "CMD", "zkServer.sh", "status" ]
      interval: 5s
      timeout: 5s
      retries: 5

  coordinator-server:
    image: apache/fluss:0.9.0-incubating
    command: coordinatorServer
    hostname: coordinator-server # Explicitly set for DNS stability
    depends_on:
      zookeeper:
        condition: service_healthy
    networks:
      - internal
    environment:
      - |
        FLUSS_PROPERTIES=
        zookeeper.address: zookeeper:2181
        bind.listeners: INTERNAL://0.0.0.0:9122, CLIENT://0.0.0.0:9123
        advertised.listeners: INTERNAL://coordinator-server:9122, CLIENT://coordinator-server:9123
        internal.listener.name: INTERNAL
        remote.data.dir: /tmp/fluss/remote-data
    ports:
      - "9123:9123"
    volumes:
      - ${PROJECT_DIR:-.}/.fluss_data:/tmp/fluss

  tablet-server:
    image: apache/fluss:0.9.0-incubating
    command: tabletServer
    depends_on:
      coordinator-server:
        condition: service_started
    networks:
      - internal
    environment:
      - |
        FLUSS_PROPERTIES=
        zookeeper.address: zookeeper:2181
        bind.listeners: INTERNAL://0.0.0.0:9122, CLIENT://0.0.0.0:9123
        advertised.listeners: INTERNAL://tablet-server:9122, CLIENT://tablet-server:9123
        internal.listener.name: INTERNAL
        tablet-server.id: 0
        kv.snapshot.interval: 0s
        data.dir: /tmp/fluss/data
        remote.data.dir: /tmp/fluss/remote-data
    ports:
      - "9124:9123"
    volumes:
      - ${PROJECT_DIR:-.}/.fluss_data:/tmp/fluss

  ui:
    build:
      context: ./ui
    ports:
      - "3000:80"
    networks:
      - frontend
    depends_on:
      ui-bridge:
        condition: service_started

  ui-bridge:
    container_name: ui-bridge
    build:
      context: ./bridge
    # Keeps bridge tightly coupled to the agent's network stack
    network_mode: "service:claw-agent"
    environment:
      - AGENT_URL=localhost:50051
      - PYTHONUNBUFFERED=1
    depends_on:
      claw-agent:
        condition: service_started

  ripcurrent-discord:
    container_name: ripcurrent-discord
    build:
      context: .
      dockerfile: ripcurrent/Dockerfile
    networks:
      - internal
      - egress
    secrets:
      - discord_bot_token
      - discord_webhook_url
      - discord_channel_id
    environment:
      - FLUSS_BOOTSTRAP_SERVERS=coordinator-server:9123
      - CLAW_SESSION_ID=user-session
    depends_on:
      coordinator-server:
        condition: service_started

networks:
  frontend:
    driver: bridge
  internal:
    driver: bridge
  egress:
    driver: bridge

secrets:
  gemini_api_key:
    file: ./secrets/gemini_api_key.txt
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt
  openai_api_key:
    file: ./secrets/openai_api_key.txt
  discord_bot_token:
    file: ./secrets/discord_bot_token.txt
  discord_webhook_url:
    file: ./secrets/discord_webhook_url.txt
  discord_channel_id:
    file: ./secrets/discord_channel_id.txt
