services:
  agent:
    build:
      context: ./agent
    ports:
      - "50051:50051"
    networks:
      - containerclaw_net
    volumes:
      - ${PROJECT_DIR:-.}:/workspace:rw
    environment:
      - LLM_GATEWAY_URL=${LLM_GATEWAY_URL:-http://llm-gateway:8000}
      - FLUSS_ENDPOINT=${FLUSS_ENDPOINT:-fluss:9092}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    user: "1000:1000"

  llm-gateway:
    build:
      context: ./llm-gateway
    ports:
      - "8000:8000"
    networks:
      - containerclaw_net
    secrets:
      - gemini_api_key
      - anthropic_api_key
      - openai_api_key
    environment:
      - RATE_LIMIT_RPM=60
      - MAX_TOKENS_PER_REQUEST=8192
      - ALLOWED_MODELS=claude-sonnet-4-20250514,gpt-4o
    security_opt:
      - no-new-privileges:true
    cap_add:
      - NET_RAW
      - NET_ADMIN
    user: "65534:65534"

  fluss:
    image: apache/flink:latest
    networks:
      - containerclaw_net
    volumes:
      - fluss_data:/var/lib/fluss

  ui:
    build:
      context: ./ui
    ports:
      - "3000:80"
    networks:
      - containerclaw_net

networks:
  containerclaw_net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400

volumes:
  fluss_data:

secrets:
  gemini_api_key:
    file: ./secrets/gemini_api_key.txt
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt
  openai_api_key:
    file: ./secrets/openai_api_key.txt
