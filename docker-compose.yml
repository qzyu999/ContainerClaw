services:
  claw-agent:
    container_name: claw-agent
    build:
      context: .
      dockerfile: agent/Dockerfile
    ports:
      - "50051:50051"
      - "5001:5001"
    networks:
      - internal
      - frontend
    volumes:
      - ${PROJECT_DIR:-.}/workspace:/workspace:rw
      - ${PROJECT_DIR:-.}/.claw_state:/state:rw
    environment:
      - PYTHONUNBUFFERED=1
      - LLM_GATEWAY_URL=${LLM_GATEWAY_URL:-http://llm-gateway:8000}
      - FLUSS_BOOTSTRAP_SERVERS=coordinator-server:9123
      - FLUSS_ENDPOINT=coordinator-server:9123
    tty: true
    stdin_open: true
    read_only: true
    tmpfs:
      - /tmp:size=512M,noexec
    security_opt:
      - "no-new-privileges:true"
      - "seccomp:unconfined"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    user: "1000:1000"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import socket; s = socket.socket(socket.AF_INET, socket.SOCK_STREAM); s.connect((\"localhost\", 50051))'"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  llm-gateway:
    build:
      context: ./llm-gateway
    ports:
      - "8000:8000"
    networks:
      - internal
      - egress
    secrets:
      - gemini_api_key
      - anthropic_api_key
      - openai_api_key
    environment:
      - RATE_LIMIT_RPM=60
      - MAX_TOKENS_PER_REQUEST=8192
    command: ["gunicorn", "-w", "4", "--timeout", "120", "--bind", "0.0.0.0:8000", "--access-logfile", "-", "--error-logfile", "-", "src.main:app"]

  zookeeper:
    image: zookeeper:3.9.2
    restart: always
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  coordinator-server:
    image: apache/fluss:0.9.0-incubating
    command: coordinatorServer
    depends_on:
      zookeeper:
        condition: service_healthy
    networks:
      - internal
    environment:
      - |
        FLUSS_PROPERTIES=
        zookeeper.address: zookeeper:2181
        bind.listeners: INTERNAL://0.0.0.0:9122, CLIENT://0.0.0.0:9123
        advertised.listeners: INTERNAL://coordinator-server:9122, CLIENT://coordinator-server:9123
        internal.listener.name: INTERNAL
        remote.data.dir: /tmp/fluss/remote-data
    ports:
      - "9123:9123"

  tablet-server:
    image: apache/fluss:0.9.0-incubating
    command: tabletServer
    depends_on:
      coordinator-server:
        condition: service_started
    networks:
      - internal
    environment:
      - |
        FLUSS_PROPERTIES=
        zookeeper.address: zookeeper:2181
        bind.listeners: INTERNAL://0.0.0.0:9122, CLIENT://0.0.0.0:9123
        advertised.listeners: INTERNAL://tablet-server:9122, CLIENT://tablet-server:9123
        internal.listener.name: INTERNAL
        tablet-server.id: 0
        kv.snapshot.interval: 0s
        data.dir: /tmp/fluss/data
        remote.data.dir: /tmp/fluss/remote-data
    ports:
        - "9124:9123"
    volumes:
      - shared-tmpfs:/tmp/fluss

  ui:
    build:
      context: ./ui
    ports:
      - "3000:80"
    networks:
      - frontend
    environment:
      - BRIDGE_URL=http://claw-agent:50051
    depends_on:
      ui-bridge:
        condition: service_started

  ui-bridge:
    build:
      context: ./bridge
    network_mode: "service:claw-agent"
    environment:
      - AGENT_URL=localhost:50051
      - GRPC_DNS_RESOLVER=native
    depends_on:
      claw-agent:
        condition: service_healthy

networks:
  frontend:
    driver: bridge
  internal:
    driver: bridge
    # internal: true
  egress:
    driver: bridge

volumes:
  shared-tmpfs:
    driver: local
    driver_opts:
      type: "tmpfs"
      device: "tmpfs"

secrets:
  gemini_api_key:
    file: ./secrets/gemini_api_key.txt
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt
  openai_api_key:
    file: ./secrets/openai_api_key.txt
