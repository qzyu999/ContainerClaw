services:
  claw-agent:
    container_name: claw-agent
    build:
      context: .
      dockerfile: agent/Dockerfile
    ports:
      - "50051:50051"
      - "5001:5001"
    networks:
      - internal
    volumes:
      - ${PROJECT_DIR:-.}/workspace:/workspace:rw
      - ${PROJECT_DIR:-.}/.claw_state:/state:rw
    environment:
      - LLM_GATEWAY_URL=${LLM_GATEWAY_URL:-http://llm-gateway:8000}
      - FLUSS_ENDPOINT=${FLUSS_ENDPOINT:-fluss:9092}
    tty: true
    stdin_open: true
    read_only: true
    tmpfs:
      - /tmp:size=512M,noexec
    security_opt:
      - "no-new-privileges:true"
      - "seccomp:unconfined"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    user: "1000:1000"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import socket; s = socket.socket(socket.AF_INET, socket.SOCK_STREAM); s.connect((\"localhost\", 50051))'"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  llm-gateway:
    build:
      context: ./llm-gateway
    ports:
      - "8000:8000"
    networks:
      - internal
      - egress
    secrets:
      - gemini_api_key
      - anthropic_api_key
      - openai_api_key
    environment:
      - RATE_LIMIT_RPM=60
      - MAX_TOKENS_PER_REQUEST=8192
    command: ["gunicorn", "--timeout", "120", "--bind", "0.0.0.0:8000", "src.main:app"]

  fluss:
    image: apache/flink:latest
    command: ["jobmanager"]
    networks:
      - internal
    volumes:
      - fluss_data:/var/lib/fluss

  ui:
    build:
      context: ./ui
    ports:
      - "3000:80"
    networks:
      - frontend
    depends_on:
      ui-bridge:
        condition: service_started

  ui-bridge:
    build:
      context: .
      dockerfile: ui/bridge.Dockerfile
    network_mode: "service:claw-agent"
    environment:
      - AGENT_URL=localhost:50051
      - GRPC_DNS_RESOLVER=native
    depends_on:
      claw-agent:
        condition: service_healthy

networks:
  frontend:
    driver: bridge
  internal:
    driver: bridge
    # internal: true
  egress:
    driver: bridge

volumes:
  fluss_data:

secrets:
  gemini_api_key:
    file: ./secrets/gemini_api_key.txt
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt
  openai_api_key:
    file: ./secrets/openai_api_key.txt
