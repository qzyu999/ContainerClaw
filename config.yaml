# ContainerClaw Configuration — Single Source of Truth
# ====================================================
# This file replaces .env, agent/src/config.py, and all scattered
# os.getenv() calls. Secrets stay in Docker Secrets (/run/secrets/).

# --- MLX LLM Server (Host-side) ---
llm_server:
  enabled: false
  model: "models/MLX-Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-v2-8bit"
  port: 8080
  host: "127.0.0.1"
  max_tokens: -1 # Auto-sync from gateway.max_tokens_per_request
  prompt_cache_size: 15
  log_level: "DEBUG"

# --- LLM Provider Definitions ---
llm:
  providers:
    mlx-local:
      type: openai          # Uses OpenAI-compatible API (passthrough)
      base_url: "http://host.docker.internal:8080/v1"
      api_key: "mlx-community"  # MLX doesn't validate keys
      models:
        - "Qwen2.5-3B-Instruct-4bit"
        - "Qwen2.5-72B-Instruct-4bit"
        - "MLX-Qwen3.5-27B-Claude-4.6-Opus-Reasoning-Distilled-v2-8bit"
        - "Qwen3-Coder-Next-6bit"
        - "Qwen3.5-122B-A10B-MLX-6.5bit"
        - "gemma-4-transformers-gemma-4-26b-a4b-it-v1"

    gemini-cloud:
      type: gemini           # Requires translation layer
      base_url: "https://generativelanguage.googleapis.com/v1beta"
      api_key_secret: "gemini_api_key"   # References Docker Secret
      models:
        - "gemini-3-flash-preview"
      settings:
        thinking_level: "HIGH"           # Gemini 3 thinking
        max_output_tokens: 8192

    openai-cloud:
      type: openai
      base_url: "https://api.openai.com/v1"
      api_key_secret: "openai_api_key"
      models:
        - "gpt-4o"
        - "gpt-4o-mini"

  # Default provider + model (used when agent config doesn't specify)
  # default_provider: "mlx-local"
  # default_model: "auto"
  default_provider: "gemini-cloud"
  default_model: "gemini-3-flash-preview"

# --- Agent Roster ---
agents:
  prompts:
    vote: |
      You are {agent_id}. Persona: {persona}.
      You are in a voting phase. A new message has arrived in the chat.
      You must review the history and vote for the ONE agent who is best suited to respond.
      The team roster and roles are: {roster}.
      CRITICAL: You must only vote for one of the primary agents listed in the roster or the vote is invalidated.
      Please collaborate together in an agile format, leveraging each others unique abilities and tools.
      If someone specifically addressed an agent, vote for them. Otherwise, vote based on merit.
      You must also evaluate if the overall task is completely finished.
      Respond ONLY in valid JSON with the following keys:
      - 'vote' (string: name of the agent)
      - 'reason' (string: one sentence reason for the vote)
      - 'is_done' (boolean: true if the job is complete, false otherwise)
      - 'done_reason' (string: one sentence explaining why the job is or isn't done).
    vote_debate: |
      ### DEBATE MODE ###
      Previous round results:
      {previous_votes}
      You are in a tie-breaker round. Read the reasoning from other agents above. Acknowledge their points. You must now either defend your original choice with stronger logic or concede and vote for another agent if their reasoning was more compelling. We must reach a consensus.
    think: |
      You are {agent_id}, participating in a multi-agent chat. Persona: {persona}.
      Team Roster: {roster}.
      Respond to the conversation if appropriate. If no action is needed respond with [WAIT].
      
      CRITICAL: If the Moderator just announced you won the election, you SHOULD contribute. If you are waiting for someone else to finish research, acknowledge it and explain what you expect from them. Do not just [WAIT] if you were specifically chosen to speak.
    think_with_tools: |
      You are {agent_id}, participating in a multi-agent software engineering team. Persona: {persona}.
      Team Roster: {roster}.
      You have access to tools: [{tool_names}]. Use them when you need to take action — read files, write code, run commands, manage the project board, or run tests. If no action is needed, respond with text explaining why.
      
      CRITICAL: If the Moderator just announced you won the election, you SHOULD contribute. Do not skip your turn if you were specifically chosen to speak.
    send_function_responses: |
      You are {agent_id}. Persona: {persona}. Team Roster: {roster}.
      You have received the results of your previous tool calls.
      Continue your analysis and decide on the next step.
    reflect: |
      You are {agent_id}. Persona: {persona}. Team Roster: {roster}.
      Reflect on the actions you just took and provide a summary of your progress.
    subagent_spawn: |
      TASK: {task_desc}

      You are an autonomous subagent. Work independently using your tools. When finished, include [DONE] in your final message. If you get stuck, include [STUCK] and explain why.
  roster:
    - name: "Alice"
      persona: "Software architect."
      tools: "default_tools"
    - name: "Bob"
      persona: "Project manager."
      tools: "default_tools"
    - name: "Carol"
      persona: "Software engineer."
      tools: "default_tools"
    - name: "David"
      persona: "Software QA tester."
      tools: "default_tools"
    - name: "Eve"
      persona: "Business user."
      tools: "default_tools"

  settings:
    default_persona: "General purpose software engineering assistant."
    default_tools:
      - "board"
      - "test_runner"
      - "diff"
      - "surgical_edit"
      - "advanced_read"
      - "repo_map"
      - "structured_search"
      - "linter"
      - "session_shell"
      - "create_file"
      - "delegate"
      - "run_tests"
    max_history_messages: 100
    max_history_chars: 480000
    max_tool_rounds: 30
    autonomous_steps: -1
    conchshell_enabled: true
    subagent_ttl_seconds: 120
    tools:
      workspace_root: "/workspace"
      output_limit_chars: 8192
      timeouts:
        shell: 60
        test_runner: 120
        search: 30
        linter: 10
        diff: 5
      search_limits:
        max_total_matches: 500
        results_per_page: 50
      repo_map_limit: 500

# --- Gateway Settings ---
gateway:
  port: 8000
  llm_timeout_s: 300
  rate_limit_rpm: 60
  max_tokens_per_request: 8192
  retry:
    max_attempts: 3
    backoff_factor: 1
    status_forcelist: [429, 500, 502, 503, 504]
  connection_pool:
    pool_connections: 10
    pool_maxsize: 10

# --- Infrastructure ---
infrastructure:
  telemetry:
    enabled: true
  flink:
    host: "flink-jobmanager"
    port: 8081
  fluss:
    bootstrap_servers: "coordinator-server:9123"
  session:
    default_id: "default-session"
  agent:
    url: "localhost:50051"

# --- Integrations ---
integrations:
  discord:
    bot_token_secret: "discord_bot_token"
    webhook_url_secret: "discord_webhook_url"
    channel_id_secret: "discord_channel_id"

# --- UI ---
ui:
  port: 3000
  anchor_templates:
    - label: "Agile Development"
      default: true
      text: |
        Focus on collaboration and role-based effort. Every agent should contribute according to 
        their specialization (Architect, Engineer, QA, etc.). Avoid one agent doing everything. 
        Synchronize frequently on the Project Board.
        
        [ANCHOR_DIRECTIVE]: Be concise. Do not write massive documents or code files in a 
        single tool call. Write documents in smaller chunks using sequential tool calls.
    - label: "Focus on Bug"
      default: false
      text: "Priority: Bug investigation. Keep your focus on the current error logs and do not diverge into feature requests. Run tests frequently."
    - label: "Strict Safety"
      default: false
      text: "CRITICAL: Safety first. Do not run any destructive commands (rm -rf, etc) without explaining the rationale first. Use 'ls' to verify context before editing."
    - label: "Code Quality"
      default: false
      text: "Goal: Refactoring for readability. Follow SOLID principles. Ensure every function has a docstring and type hints. Do not sacrifice performance."
    - label: "QA Mode"
      default: false
      text: "You are in QA mode. Your sole mission is to find edge cases and break the implementation. Write exhaustive unit tests including null/empty checks."
